<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Assistant</title>
    <script type="text/javascript" src="/eel.js"></script>
    
    <!-- Google Fonts - Plus Jakarta Sans for extreme sleekness -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" type="text/css" href="css/jquery.convform.css">
</head>
<body>
    <!-- Floating Cyber Header -->
    <header>
        <div class="header-wrapper">
            <div class="logo">
                <img src="images/icon.png" alt="Max Logo" width="30" height="30">
            </div>
            <div class="header-info">
                <h1 class="awesome">MAX</h1>
                <div class="header-controls">
                    <div class="status-indicator">
                        <span class="status-dot"></span>
                        <span class="status-text">Online</span>
                    </div>
                    <select id="micSelect" class="mic-select-dropdown" aria-label="Select Microphone">
                        <option value="">Default Mic</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <!-- Chat Interface Container -->
    <div class="chat_box">
        <div class="conv-form-wrapper">
            <div id="messages">
                <!-- Spacer for layout -->
                <div class="message-welcome">
                    <!-- Jarvis Holographic Reactive Orb centerpiece -->
                    <div class="jarvis-container" id="jarvisContainer">
                        <div class="jarvis-orb">
                            <div class="ring outer-ring"></div>
                            <div class="ring inner-ring"></div>
                            <div class="core-glow"></div>
                        </div>
                        <div class="sound-wave" id="soundWave">
                            <span class="bar"></span>
                            <span class="bar"></span>
                            <span class="bar"></span>
                            <span class="bar"></span>
                            <span class="bar"></span>
                            <span class="bar"></span>
                            <span class="bar"></span>
                            <span class="bar"></span>
                        </div>
                    </div>
                    <h3>System Initialized</h3>
                    <p>Voice & Gesture controls active</p>
                </div>
            </div>
        </div>
        
        <!-- Floating Glass Input Pill -->
        <div id="convForm" class="convFormDynamic">
            <div class="options dragscroll"></div>
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Ask Max or use gestures..." class="userInputDynamic" autocomplete="off">
                <button id="userInputButton" type="button" class="submit" aria-label="Send Message">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <span class="clear"></span>
        </div>
    </div>

    <script type="text/javascript" src="js/main.js"></script>
</body>
</html>
